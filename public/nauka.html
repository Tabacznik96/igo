<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nauka – PSP IGO</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .nauka-header { background: linear-gradient(135deg, #0a1628, #1a2e4a); color: #fff; padding: 16px 20px; border-bottom: 3px solid #f39c12; }
    .nauka-header h1 { font-size: 1.3rem; }
    .nauka-header p { font-size: 0.8rem; opacity: 0.75; }
    .back-link { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.85rem; display: inline-block; margin-bottom: 8px; }
    .back-link:hover { color: #fff; }
    .section-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .section-card { border: 2px solid var(--mid-gray); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 12px; }
    .section-card:hover { border-color: var(--navy-mid); background: #f0f4ff; }
    .section-card.selected { border-color: var(--navy-mid); background: #e8f0fe; }
    .section-card .sec-key { width: 38px; height: 38px; background: var(--navy-mid); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
    .section-card .sec-info { flex: 1; }
    .section-card .sec-name { font-size: 0.88rem; font-weight: 600; color: var(--navy); line-height: 1.3; }
    .section-card .sec-count { font-size: 0.78rem; color: var(--dark-gray); }
    .answer-correct .answer-label { border-color: var(--green) !important; background: #d4edda !important; }
    .answer-wrong .answer-label { border-color: var(--red) !important; background: #f8d7da !important; }
    .answer-correct .answer-letter { background: var(--green) !important; color: #fff !important; }
    .answer-wrong .answer-letter { background: var(--red) !important; color: #fff !important; }
    .feedback-box { padding: 14px 16px; border-radius: var(--radius); margin-top: 12px; font-weight: 600; }
    .feedback-ok { background: #d4edda; color: #155724; border-left: 4px solid var(--green); }
    .feedback-err { background: #f8d7da; color: #721c24; border-left: 4px solid var(--red); }
    .progress-dots { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--mid-gray); }
    .dot.ok { background: var(--green); }
    .dot.err { background: var(--red); }
    .dot.current { background: var(--gold); }
    #configView, #quizView, #resultView { display: none; }
    #sectionSelectView { display: block; }
  </style>
</head>
<body>

<div class="nauka-header">
  <a href="/" class="back-link">← Panel administratora</a>
  <h1>📚 Tryb nauki</h1>
  <p>Ćwicz pytania z wybranych działów – bez limitu czasu</p>
</div>

<!-- SECTION SELECT -->
<div id="sectionSelectView" class="container">
  <div class="card">
    <div class="card-title">📂 Wybierz działy</div>
    <div id="sectionGrid" class="section-grid"></div>
    <div style="margin-top:16px; display:flex; gap:8px; flex-wrap:wrap;">
      <button class="btn btn-outline btn-sm" onclick="selectAll()">Zaznacz wszystkie</button>
      <button class="btn btn-outline btn-sm" onclick="selectNone()">Odznacz wszystkie</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">⚙️ Ustawienia testu</div>
    <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:flex-end;">
      <div class="form-group" style="margin:0; flex:1; min-width:140px;">
        <label>Liczba pytań</label>
        <input type="number" id="questionCount" class="form-control" value="20" min="5" max="50">
      </div>
      <div class="form-group" style="margin:0; flex:1; min-width:140px;">
        <label>Zacznij od pytania nr</label>
        <input type="number" id="fromQuestion" class="form-control" value="1" min="1">
      </div>
    </div>
    <div id="selectionInfo" style="margin-top:12px; font-size:0.9rem; color:var(--dark-gray);"></div>
    <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn btn-danger" onclick="startQuiz()">▶ Rozpocznij naukę</button>
      <button class="btn btn-outline" onclick="selectAllAndStart()">🎲 Losuj ze wszystkich</button>
    </div>
  </div>
</div>

<!-- QUIZ VIEW -->
<div id="quizView">
  <div class="timer-bar" style="background:var(--navy-light); position:sticky; top:0; z-index:100;">
    <span style="font-size:0.85rem; opacity:0.85;">Nauka</span>
    <span id="quizProgress" style="font-weight:700; font-size:1.1rem;"></span>
    <div class="progress-dots" id="progressDots" style="margin:0; gap:5px;"></div>
    <button class="btn btn-outline btn-sm" style="border-color:rgba(255,255,255,0.5); color:#fff;" onclick="endQuiz()">✕ Zakończ</button>
  </div>

  <div class="container" style="padding-top:16px;">
    <div id="quizQuestion"></div>
  </div>
</div>

<!-- RESULT VIEW -->
<div id="resultView" class="container">
  <div class="card" style="text-align:center; padding:32px;">
    <div style="font-size:3rem; margin-bottom:12px;">📊</div>
    <h2 style="color:var(--navy); margin-bottom:8px;">Wynik sesji nauki</h2>
    <div id="resultScore" style="font-size:2rem; font-weight:700; color:var(--navy); margin:16px 0;"></div>
    <div id="resultDetails" style="font-size:0.9rem; color:var(--dark-gray); margin-bottom:24px;"></div>
    <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
      <button class="btn btn-danger" onclick="restartQuiz()">🔄 Jeszcze raz</button>
      <button class="btn btn-outline" onclick="backToConfig()">← Zmień ustawienia</button>
    </div>
  </div>
</div>

<script src="/nauka.js"></script>
</body>
</html>
