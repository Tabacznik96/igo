<div id="protocolDoc" style="display:none;"></div>

<script src="/protocol.js"></script>
<script>
function goBackFromPrint(){
  const params=new URLSearchParams(location.search);
  const u=params.get('u')||'',h=params.get('h')||'';
  const sid=location.pathname.split('/')[3];
  // try to go back to protocol page for this protocol id
  // we don't have session id here, just go back in history
  history.back();
}

(async function(){
  const params=new URLSearchParams(location.search);
  let aU=params.get('u')||'',aH=params.get('h')||'';
  if(!aU){try{const c=JSON.parse(sessionStorage.getItem('sessionCreds')||'{}');aU=c.u||'';aH=c.h||'';}catch(e){}}
  const pid=location.pathname.split('/')[3];
  const hdr=()=>({'x-username':aU,'x-password-hash':aH});
  let proto;
  try{
    const r=await fetch(`/api/protocols/${pid}`,{headers:hdr()});
    proto=await r.json();
    if(proto.error)throw new Error(proto.error);
    if(typeof proto.sections_json==='string')proto.sections_json=JSON.parse(proto.sections_json);
  }catch(e){document.getElementById('loadingMsg').textContent='Błąd: '+e.message;return;}

  const cfg=PROTOCOL_CONFIG[proto.unit_type];
  const sd=proto.sections_json||{};
  const date=new Date(proto.created_at).toLocaleDateString('pl-PL');
  let html='';
  if(proto.unit_type==='jrg') html=buildJRG(proto,cfg,sd,date);
  else if(proto.unit_type==='osp') html=buildOSP(proto,cfg,sd,date);
  else html=buildGeneric(proto,cfg,sd,date);

  document.getElementById('loadingMsg').style.display='none';
  const el=document.getElementById('protocolDoc');
  el.innerHTML=html; el.style.display='block';
  document.title='Protokół IGO – '+proto.unit+' – '+date;
})();

function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function dots(n){let s='';for(let i=0;i<n;i++)s+='<div class="dot"></div>';return s;}
function spts(secId,cfg,sd){
  const sec=cfg.sections.find(s=>s.id===secId);
  if(!sec)return 0;
  const v=getPoints(sec,sd[secId]||{});
  return v!=null?v:0;
}

// ─── JRG ────────────────────────────────────────────────────────────
function buildJRG(proto,cfg,sd,date){
  const aSd=sd.alarm||{}, fSd=sd.firefighters||{}, vSd=sd.vehicles||{};
  const dSd=sd.docs||{}, tSd=sd.test||{}, xSd=sd.exercise||{};
  const aP=spts('alarm',cfg,sd), fP=spts('firefighters',cfg,sd),
        vP=spts('vehicles',cfg,sd), dP=spts('docs',cfg,sd),
        tP=spts('test',cfg,sd), xP=spts('exercise',cfg,sd);
  const total=aP+fP+vP+dP+tP+xP;
  const grade=calcGrade(Math.round(total/100*100));
  const alarmSec=cfg.sections.find(s=>s.id==='alarm');
  const tSec=aSd.timeSeconds;
  const timeStr=tSec!=null?formatTime(tSec,false):'';

  return `<div class="form-wrap">

${[['1.',e(proto.inspector_name||''),'przewodniczący Zespołu'],['2.','','członek Zespołu'],['3.','','członek Zespołu'],['4.','','członek Zespołu']].map(([n,v,r])=>`<tr>
<td class="nb" style="width:20px;">${n}</td>

function jrgVehicleRows(vSd,sec){
  const official=[
    {name:'Brak aktualnych badań technicznych pojazdów',rng:'0-3'},
    {name:'Przedłużające się wycofanie pojazdu, sprzętu silnikowego lub ratowniczego z eksploatacji (z wyłączeniem przypadków niezależnych od PSP), brak podjęcia działań zmierzających do niezwłocznego wprowadzenia do podziału bojowego, brak lub niepełny stan środków gaśniczych, neutralizatorów i sorbentów, niezgodność stanu faktycznego z Bazą Sił i Środków',rng:'0-3'},
    {name:'Brak aktualnych dopuszczeń UDT, dopuszczeń i atestów serwisów producentów odnośnie stosowanych badań sprzętu, w przypadku braku aktualnego dopuszczenia UDT w pojeździe SH – błąd krytyczny zagadnienia',rng:'0-3'},
    {name:'Brak właściwych zapisów w okresowej karcie pracy pojazdu, sprzętu silnikowego lub pływającego',rng:'0-2'},
    {name:'Brak kompletności i sprawności sprzętu, niewłaściwe zamocowanie i przewożenie w pojeździe',rng:'0-3'},
    {name:'Brak właściwego oznakowania operacyjnego',rng:'0-1'},
  ];
  const items=sec?sec.items:[];
  return official.map((oi,i)=>{
    const appIt=items[i];
    const v=appIt&&vSd.items?vSd.items[appIt.id]:null;
    const earned=v!=null?(v==='ok'?appIt.points:v==='partial'?Math.round(appIt.points*0.5*2)/2:0):'';
    return `<tr><td class="lp c">${i+1})</td><td>${oi.name}</td><td class="rng">${oi.rng}</td><td class="earn c">${earned!==''?'<strong>'+earned+'</strong>':''}</td></tr>
<tr><td colspan="4" style="border-top:none;font-size:9pt;padding:2px 6px;">Uwagi:${dots(2)}</td></tr>`;
  }).join('');
}

function jrgExerciseTable(xSd,sec,totalPts){
  const anyCrit=sec&&(sec.criticalErrors||[]).some(e=>xSd.criticalErrors&&xSd.criticalErrors[e.id]);
  const groups=[
    {g:'Określenie celu działań',items:[
      {lp:1,n:'błąd w określeniu priorytetu ratowniczego',pts:2,bold:true},
      {lp:2,n:'określanie celu głównego',pts:2},
      {lp:3,n:'określanie celu pośredniego',pts:2},
      {lp:4,n:'wykonanie rozpoznania',pts:2},
    ]},
    {g:'Przyjęty sposób osiągnięcia celu (zamiar taktyczny)',items:[
      {lp:5,n:'przyjęty wariant rozwinięcia',pts:2},
      {lp:6,n:'dobór technik ratowniczych',pts:2},
      {lp:7,n:'dobór sprzętu',pts:2},
      {lp:8,n:'niezgodność z możliwościami taktycznymi sił i środków jednostki ratowniczo-gaśniczej',pts:2},
    ]},
    {g:'Sposób realizacji zamiaru takt. (rozwinięcie sił)',items:[
      {lp:9,n:'sposób sprawiania sprzętu',pts:2},
      {lp:10,n:'obsługa sprzętu',pts:2},
      {lp:11,n:'sposób organizacji i realizacji łączności',pts:2},
      {lp:12,n:'technika wykonywania czynności ratowniczych',pts:2},
      {lp:13,n:'przestrzegania przepisów i zasad bezpieczeństwa',pts:4},
      {lp:14,n:'błędy krytyczne według wykazu',pts:null,bkz:true},
    ]},
    {g:'Reagowanie na zmiany rozwoju sytuacji',items:[
      {lp:15,n:'brak reakcji',pts:4},
      {lp:16,n:'reagowanie z opóźnieniem',pts:2},
      {lp:17,n:'nieprawidłowa reakcja (nieadekwatna do sytuacji)',pts:2},
    ]},
    {g:'Sposób kierowania działaniami',items:[
      {lp:18,n:'jasność, jednoznaczność rozkazów',pts:2},
      {lp:19,n:'rozdział zadań',pts:3},
      {lp:20,n:'określenie sposobu realizacji zadań',pts:2},
      {lp:21,n:'kontrola realizacji zadań (ingerencja, reagowanie na błędy w realizacji postawionych)',pts:4},
      {lp:22,n:'organizacja terenu akcji',pts:1},
      {lp:23,n:'umiejętność korzystania z uprawnień KDR',pts:1},
      {lp:24,n:'wybór miejsca pracy KDR',pts:1},
      {lp:25,n:'współpraca z SK KP PSP lub SK KM PSP',pts:1},
      {lp:26,n:'sporządzenie wymaganej dokumentacji',pts:1},
    ]},
  ];

  // Map app errors to lp numbers (best effort)
  const lpMap={1:'ex01',2:'ex02',3:'ex03',4:'ex04',5:'ex07',6:'ex08',7:'ex09',8:'ex10',9:'ex12',10:'ex11',11:'ex10',12:'ex07',13:'ex13',15:'ex06',16:'ex05',18:'ex14',19:'ex03',21:'ex11',13:'ex13'};

  let rows='';
  for(const grp of groups){
    const rc=grp.items.length;
    let first=true;
    for(const item of grp.items){
      const appErrId=lpMap[item.lp];
      const appErr=sec&&appErrId?sec.errors.find(er=>er.id===appErrId):null;
      const appSt=appErr&&xSd.errors?xSd.errors[appErr.id]:null;
      const checked=appSt&&appSt.checked;
      const pen=checked?(appSt.count||1)*(appErr?appErr.penalty:item.pts||0):null;
      const isCritRow=item.bkz&&anyCrit;
      rows+=`<tr${checked||isCritRow?' style="background:#fff0f0;"':''}>
<td class="lp c">${item.lp}</td>
${first?`<td rowspan="${rc}" style="text-align:center;vertical-align:middle;font-size:9pt;width:120px;">${e(grp.g)}</td>`:''}
<td style="${item.bold?'font-weight:bold;':''}">${e(item.n)}</td>
<td class="rng c">${item.bkz?'<span class="bkz">BKZ (*)</span>':item.pts}</td>
<td class="earn c">${checked?'<strong>'+pen+'</strong>':(isCritRow?'<strong class="bkz">BKZ</strong>':'')}</td>
</tr>`;
      first=false;
    }
  }

  // Add extra errors from app
  let extraRows='';
  (xSd.extraErrors||[]).forEach((ex,i)=>{
    if(ex.name||ex.penalty>0){
      extraRows+=`<tr style="background:#fff0f0;"><td class="lp c">${27+i}</td><td colspan="2">${e(ex.name||'Inne uchybienie')}</td><td class="rng c">—</td><td class="earn c"><strong>${ex.penalty||0}</strong></td></tr>`;
    }
  });

  return `<table>
<thead>
<tr><th class="lp">Lp.</th><th style="width:110px;">Elementy podlegające sprawdzeniu w ramach inspekcji gotowości operacyjnej</th><th></th><th class="rng">Zakres punktacji</th><th class="earn">Punkty karne</th></tr>
<tr style="background:#e8e8e8;font-size:9pt;"><td class="lp c">1</td><td class="c">2</td><td class="c">3</td><td class="rng c">4</td><td class="earn c">5</td></tr>
</thead>
<tbody>
${rows}${extraRows}
<tr><td colspan="5" style="font-size:9pt;padding:2px 6px;">(*) Błąd Krytyczny Zagadnienia – ocena za ćwiczenie „0"</td></tr>
<tr><td colspan="5" style="padding:4px 6px;">UWAGI:${xSd.notes?'<br><em>'+e(xSd.notes)+'</em>':''}${dots(5)}</td></tr>
<tr class="sum"><td colspan="3" class="c"><strong>Suma uzyskanych punktów.</strong> Ogólną ocenę stanowi suma punktów uzyskanych podczas oceny poszczególnych elementów działu VI.</td><td class="rng c">0-50</td><td class="earn c" style="font-size:14pt;"><strong>${totalPts}</strong></td></tr>
</tbody></table>`;
}

function ospGearItems(fSd,sec){
  const items=sec?sec.checks:[];
  const official=['ubranie specjalne','ubranie specjalne lekkie (opcjonalnie)','rękawice specjalne','rękawice techniczne','kominiarka','hełm strażacki','buty strażackie gumowe','buty strażackie skórzane','latarka ATEX w wykonaniu przeciwwybuchowym','maska do aparatu ochrony dróg oddechowych','sygnalizator bezruchu','2 komplety szelek bezpieczeństwa na załogę samochodu pożarniczego'];
  return official.map(name=>`<tr><td>${name}</td><td class="rng">0-1</td><td class="earn"></td></tr>`).join('');

function ospVehicleRows(vSd,sec){
  const official=[
    {n:'brak aktualnych badań technicznych lub aktualnego ubezpieczenia pojazdu pożarniczego – dotyczy osp posiadającej jeden pojazd pożarniczy',p:'BK'},
    {n:'brak aktualnych badań technicznych lub aktualnego ubezpieczenia jednego z pojazdów pożarniczych osp – dotyczy osp posiadającej więcej niż jeden pojazd pożarniczy',p:'3'},
    {n:'brak sprawności pojazdu zgłoszonego do podziału bojowego, który nie został wycofany z podziału',p:'3'},
    {n:'przedłużające się wycofanie pojazdu (brak podjęcia działań zmierzających do niezwłocznego wprowadzenia do podziału bojowego), sprzętu silnikowego lub ratowniczego z eksploatacji',p:'3'},
    {n:'brak aktualnych dopuszczeń UDT, dopuszczeń i atestów serwisów producentów odnośnie stosowanych badań sprzętu',p:'3'},
    {n:'brak kompletności i sprawności sprzętu, niewłaściwe zamocowanie i przewożenie w pojeździe',p:'3'},
    {n:'brak 4 kompletów aparatów ochrony układu oddechowego',p:'2'},
    {n:'brak radiotelefonu noszonego – min. 4 szt.',p:'2'},
    {n:'brak radiotelefonu przewoźnego – 1 szt. w każdym pojeździe zgłoszonym do podziału bojowego lub brak radiotelefonu przewoźnego',p:'2'},
    {n:'brak kompletności, niesprawność lub brak ważnego przeglądu zestawu hydraulicznego',p:'2'},
    {n:'środki i materiały pod względem kompletności oraz terminy przydatności w torbie R1 lub braki w wyposażeniu zestawu ratownictwa medycznego',p:'2'},
    {n:'brak właściwego oznakowania operacyjnego',p:'1'},
    {n:'niesprawność sprzętu łączności lub brak wymaganej obsady kanałowej',p:'1'},
    {n:'brak druków dokumentowania działań ratowniczych',p:'1'},
    {n:'brak dokumentacji odwodowej (zgodnie z rozkazem właściwego komendanta wojewódzkiego PSP) – dotyczy osp wyznaczonych do odwodów operacyjnych na obszarze województwa',p:'1'},
    {n:'brak instrukcji przyjęcia śmigłowca LPR',p:'1'},
    {n:'brak danych radiowych (aktualizacja raz do roku)',p:'1'},
  ];
  const items=sec?sec.items:[];
  return official.map((oi,i)=>{
    const appIt=items[i];
    const v=appIt&&vSd.items?vSd.items[appIt.id]:null;
    const earned=v!=null?(v==='ok'?0:v==='partial'?Math.ceil((appIt?appIt.points:0)*0.5):appIt?appIt.points:0):'';
    return `<tr><td>${oi.n}</td><td class="rng c">${oi.p}</td><td class="earn c">${earned!==''?'<strong>'+earned+'</strong>':''}</td></tr>
<tr><td colspan="3" style="font-size:9pt;border-top:none;padding:2px 6px;">UWAGI:${dots(1)}</td></tr>`;
  }).join('');
}

function ospExerciseTable(xSd,sec,totalPts){
  const anyCrit=sec&&(sec.criticalErrors||[]).some(er=>xSd.criticalErrors&&xSd.criticalErrors[er.id]);
  const groups=[
    {g:'Rozpoznanie i określenie zamiaru taktycznego',items:[
      {lp:1,n:'błąd w określeniu priorytetu ratowniczego',pts:null,bkz:true},
      {lp:2,n:'zabezpieczenie miejsca zdarzenia',pts:2},
      {lp:3,n:'rozpoznanie sytuacji przez dowódcę',pts:3},
      {lp:4,n:'przekazanie informacji do stanowiska kierowania (współpraca ze stanowiskiem, dysponowanie dodatkowych sis)',pts:3},
      {lp:5,n:'określenie celów do realizacji',pts:2},
    ]},
    {g:'Kierowanie działaniami ratowniczymi',items:[
      {lp:6,n:'rozdział zadań w sposób jasny, jednoznaczny',pts:2},
      {lp:7,n:'określenie sposobu realizacji zadań',pts:2},
      {lp:8,n:'kontrola realizacji zadań (ingerencja, reagowanie na błędy w realizacji postawionych zadań)',pts:2},
      {lp:9,n:'reagowanie na zmiany sytuacji',pts:2},
    ]},
    {g:'Wykonanie działań: właściwy dobór i optymalne wykorzystanie sprzętu, przestrzeganie procedur ratowniczych',items:[
      {lp:10,n:'dobór sprzętu',pts:2},
      {lp:11,n:'obsługa sprzętu',pts:4},
      {lp:12,n:'praca zespołowa - komunikacja dowódca i załoga',pts:2},
      {lp:13,n:'prowadzenie korespondencji radiowej',pts:2},
      {lp:14,n:'przestrzeganie procedur ratowniczych',pts:2},
      {lp:15,n:'technika wykonywania czynności ratowniczych',pts:4},
    ]},
    {g:'Przestrzeganie zasad bezpieczeństwa',items:[
      {lp:16,n:'wykonywanie czynności ratowniczych w sposób realnie zagrażający zdrowiu lub życiu ratowników',pts:null,bkz:true},
      {lp:17,n:'używanie środków ochrony indywidualnej adekwatnych do zagrożenia',pts:4},
      {lp:18,n:'zasady higieny po zakończeniu działań',pts:2},
    ]},
  ];

  let rows='';
  for(const grp of groups){
    const rc=grp.items.length;
    let first=true;
    for(const item of grp.items){
      const appErr=sec?sec.errors.find(er=>er.id==='ex'+(item.lp<10?'0'+item.lp:item.lp)):null;
      const appSt=appErr&&xSd.errors?xSd.errors[appErr.id]:null;
      const checked=appSt&&appSt.checked;
      const pen=checked?(appSt.count||1)*(appErr?appErr.penalty:item.pts||0):null;
      const isCritRow=item.bkz&&anyCrit;
      rows+=`<tr${checked||isCritRow?' style="background:#fff0f0;"':''}>
<td class="lp c">${item.lp}</td>
${first?`<td rowspan="${rc}" style="text-align:center;vertical-align:middle;font-size:9pt;width:110px;">${e(grp.g)}</td>`:''}
<td>${e(item.n)}</td>
<td class="rng c">${item.bkz?'<span class="bkz">BKZ (*)</span>':item.pts}</td>
<td class="earn c">${checked?'<strong>'+pen+'</strong>':(isCritRow?'<strong class="bkz">BKZ</strong>':'')}</td>
</tr>`;
      first=false;
    }
  }

  let extraRows='';
  (xSd.extraErrors||[]).forEach((ex,i)=>{
    if(ex.name||ex.penalty>0){
      extraRows+=`<tr style="background:#fff0f0;"><td class="lp c">${19+i}</td><td colspan="2">${e(ex.name||'Inne uchybienie')}</td><td class="rng c">—</td><td class="earn c"><strong>${ex.penalty||0}</strong></td></tr>`;
    }
  });

  return `<table>
<thead>
<tr><th class="lp">L.p.</th><th style="width:110px;">Zagadnienie</th><th>Oceniane elementy</th><th class="rng">Liczba punktów karnych za jeden błąd</th><th class="earn">Przyznane punkty karne</th></tr>
<tr style="background:#e8e8e8;font-size:9pt;"><td class="lp c">1</td><td class="c">2</td><td class="c">3</td><td class="rng c">4</td><td class="earn c">5</td></tr>
</thead>
<tbody>
${rows}${extraRows}
<tr><td colspan="5" style="font-size:9pt;padding:2px 6px;">(*) Błąd Krytyczny Zagadnienia – ocena za ćwiczenie „0"</td></tr>
<tr class="sum"><td colspan="3" class="c"><strong>Suma uzyskanych punktów.</strong> Ogólną ocenę stanowi suma punktów uzyskanych podczas oceny poszczególnych elementów działu V.</td><td class="rng c">0-40</td><td class="earn c" style="font-size:14pt;"><strong>${totalPts}</strong></td></tr>
</tbody></table>`;
}
